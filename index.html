<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonathan</title>
    <link rel="stylesheet" href="assets/css/home.css">
</head>
<body>
<div id="navbar-container"></div>

<!-- Slider Layout -->
<main class="slider-layout">
    <div class="content-side">
        <div class="content-wrapper">
            <h1 class="main-title">Visual<br>Storytelling</h1>
            <p class="subtitle">Moments captured with soul and perspective</p><style>
            .main-title, .subtitle {
              color: white;
            }
        </style>
            <button class="submit-btn">
                View Gallery
                <span class="btn-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </span>
            </button>

            <div class="slider-controls">
                <button class="slider-prev">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <div class="slider-dots"></div>
                <button class="slider-next">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="slider-side">
        <div class="slider-container">
            <div class="slider-track">
                <!-- Images will be injected via JS -->
            </div>
        </div>
    </div>
</main>

<div id="footer-container"></div>

<script src="assets/js/loadcomponents.js"></script>
<script src="assets/js/home.js"></script>
</body>
</html>
