<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work | LUMINOUS VISUALS</title>
    <link rel="stylesheet" href="assets/css/work.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
<div id="navbar-container"></div>

<!-- Hero Section -->
<section class="work-hero">
    <div class="hero-video">
        <video autoplay muted loop playsinline>
            <source src="assets/file/a2.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="hero-content">
        <h1 class="hero-title">Visual<br>Storytelling</h1>
        <p class="hero-subtitle">Capturing moments that transcend time through innovative photography and cinematography</p>
        <div class="scroll-indicator">
            <span>Explore Work</span>
            <div class="arrow-down"></div>
        </div>
    </div>
</section>

<!-- Projects Grid -->
<section class="projects-grid">
    <!-- Row 1 - 3 images -->
    <div class="grid-row">
        <div class="project-item" data-project="1">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1483181957632-8bda974cbc91?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80')"></div>
            <h4 class="project-title">Fashion Editorial</h4>
        </div>
        <div class="project-item" data-project="2">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1497436072909-60f360e1d4b1?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80')"></div>
            <h4 class="project-title">Automotive</h4>
        </div>
        <div class="project-item video" data-project="3">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1528&q=80')">
                <div class="play-icon">▶</div>
            </div>
            <h4 class="project-title">Motion Project</h4>
        </div>
    </div>

    <!-- Row 2 - 2 images -->
    <div class="grid-row">
        <div class="project-item large" data-project="4">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1493246507139-91e8fad9978e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2940&q=80')"></div>
            <h4 class="project-title">Architecture</h4>
        </div>
        <div class="project-item" data-project="5">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80')"></div>
            <h4 class="project-title">Runway</h4>
        </div>
    </div>

    <!-- Row 3 - 3 images -->
    <div class="grid-row">
        <div class="project-item video" data-project="6">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80')">
                <div class="play-icon">▶</div>
            </div>
            <h4 class="project-title">Concert Film</h4>
        </div>
        <div class="project-item" data-project="7">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1469334031218-e382a71b716b?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80')"></div>
            <h4 class="project-title">Underwater</h4>
        </div>
        <div class="project-item" data-project="8">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80')"></div>
            <h4 class="project-title">Festival</h4>
        </div>
    </div>

    <!-- Row 4 - 2 images -->
    <div class="grid-row">
        <div class="project-item" data-project="9">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1493863641943-9b68992a8d07?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1458&q=80')"></div>
            <h4 class="project-title">Product</h4>
        </div>
        <div class="project-item video" data-project="10">
            <div class="project-image" style="background-image: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1920&q=80')">
                <div class="play-icon">▶</div>
            </div>
            <h4 class="project-title">Documentary</h4>
        </div>
    </div>
</section>

<!-- Project Popup -->
<div class="project-popup">
    <div class="popup-container">
        <button class="close-popup">×</button>
        <div class="popup-content">
            <div class="popup-media">
                <div class="main-media">
                    <img src="" alt="" class="popup-image">
                    <video autoplay muted loop playsinline class="popup-video" style="display: none;"></video>
                </div>
                <div class="media-thumbnails"></div>
            </div>
        </div>
    </div>
</div>

<div id="footer-container"></div>
<script src="assets/js/loadcomponents.js"></script>
<script src="assets/js/work.js"></script>
</body>
</html>
